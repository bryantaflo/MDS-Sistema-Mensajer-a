<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDS - Sistema de Mensajería Individual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MVP Sistema de Mensajería y Pedidos</h1>
        <p>Desarrollo Individual - Bryant Flor</p>
    </header>

    <main>
        <section id="chat-container">
            <div id="chat-box">
                <p><strong>Sistema:</strong> Bienvenido al módulo de mensajería del MVP. Escribe el código de un ticket (Ej: MDS-1) para consultar Jira.</p>
            </div>
            
            <form id="message-form" onsubmit="return false;">
                <input type="text" id="user-message" placeholder="Escribe tu mensaje o ticket de Jira aquí...">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Universidad del Valle - Metodologías de Desarrollo de Software</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
