<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDS - Sistema de Mensajería Individual</title>
</head>
<body>
    <header>
        <h1>MVP Sistema de Mensajería y Pedidos</h1>
        <p>Desarrollo Individual - Bryant Flor</p>
    </header>

    <main>
        <section id="chat-container">
            <div id="chat-box" style="border: 1px solid #ccc; height: 200px; padding: 10px; margin-bottom: 10px; background-color: #f9f9f9;">
                <p><strong>Sistema:</strong> Bienvenido al módulo de mensajería del MVP.</p>
            </div>
            
            <form id="message-form" onsubmit="return false;">
                <input type="text" id="user-message" placeholder="Escribe tu mensaje aquí..." style="width: 70%; padding: 5px;">
                <button type="submit" style="padding: 5px 10px;">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Universidad del Valle - Metodologías de Desarrollo de Software</p>
    </footer>
</body>
</html>
